databases:
  - name: nx-db
    plan: starter
    databaseName: nxterminal
    postgresMajorVersion: 15

services:
  # ── Redis ─────────────────────────────────────────
  - type: redis
    name: nx-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

  # ── API Server (FastAPI + WebSocket) ──────────────
  - type: web
    name: nx-api
    runtime: python
    plan: starter
    region: ohio
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT --workers 8
    healthCheckPath: /health
    envVars:
      # Absolute path (not ".") so a dashboard edit that cd's into a
      # subdir doesn't silently break `from backend.services... import`.
      # The API's ledger imports are unconditional, so any break would
      # crash uvicorn loudly — unlike the engine's guarded imports —
      # but we prefer the same defensive posture in both services.
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: NX_DB_HOST
        fromDatabase:
          name: nx-db
          property: host
      - key: NX_DB_PORT
        fromDatabase:
          name: nx-db
          property: port
      - key: NX_DB_NAME
        fromDatabase:
          name: nx-db
          property: database
      - key: NX_DB_USER
        fromDatabase:
          name: nx-db
          property: user
      - key: NX_DB_PASS
        fromDatabase:
          name: nx-db
          property: password
      - key: NX_DB_SCHEMA
        value: nx
      - key: REDIS_URL
        fromService:
          name: nx-redis
          type: redis
          property: connectionString
      # DRY_RUN=false enables real on-chain claim syncs.
      # Default in code is "true" for safety — must be overridden here.
      # The API service triggers syncs via POST /api/claim-sync/force.
      # See audit_reports/STEP_4_claim_and_treasury.md section 4.4.5
      - key: DRY_RUN
        value: "false"

  # ── Simulation Engine (Background Worker) ─────────
  - type: worker
    name: nx-engine
    runtime: python
    plan: starter
    region: ohio
    buildCommand: pip install -r backend/requirements.txt
    # IMPORTANT: PYTHONPATH is set INLINE (absolute) to survive a subshell
    # or dashboard-level startCommand that cd's into backend/engine and
    # sets PYTHONPATH=. (relative). A relative PYTHONPATH from the wrong
    # cwd silently breaks `from backend.services.ledger import ...`,
    # which in turn silently disables every engine shadow write. The
    # engine fallback in engine.py also injects project root into
    # sys.path as defense-in-depth. Keep both.
    startCommand: PYTHONPATH=/opt/render/project/src python backend/engine/run_all.py
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: NX_DB_HOST
        fromDatabase:
          name: nx-db
          property: host
      - key: NX_DB_PORT
        fromDatabase:
          name: nx-db
          property: port
      - key: NX_DB_NAME
        fromDatabase:
          name: nx-db
          property: database
      - key: NX_DB_USER
        fromDatabase:
          name: nx-db
          property: user
      - key: NX_DB_PASS
        fromDatabase:
          name: nx-db
          property: password
      - key: NX_DB_SCHEMA
        value: nx
      - key: REDIS_URL
        fromService:
          name: nx-redis
          type: redis
          property: connectionString
      # DRY_RUN=false enables real on-chain claim syncs.
      # Default in code is "true" for safety — must be overridden here.
      # The engine worker runs claim_sync via backend/engine/claim_sync.py.
      # See audit_reports/STEP_4_claim_and_treasury.md section 4.4.5
      - key: DRY_RUN
        value: "false"
