<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NX ARENA // Digital Battle v4</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-pink: #ff4dff;
    --neon-cyan: #00e5ff;
    --neon-violet: #9d4dff;
    --neon-green: #00ff9f;
    --glow-pink: rgba(255, 77, 255, 0.6);
    --glow-cyan: rgba(0, 229, 255, 0.6);
    --dark: #050010;
    --panel: #140828;
    --text: #f0e8ff;
    --dim: #8075a0;
    --hp-green: #00ff9f;
    --hp-yellow: #ffcc00;
    --hp-red: #ff3864;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--dark);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .game {
    position: relative;
    width: min(96vw, 1100px);
    aspect-ratio: 16 / 10;
    background: #050010;
    border: 3px solid #000;
    box-shadow:
      0 0 0 2px var(--neon-violet),
      0 0 40px rgba(157, 77, 255, 0.5),
      0 20px 80px rgba(0, 0, 0, 0.9);
    overflow: hidden;
  }

  /* Three.js canvas fills the background */
  #bg-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* Scanlines overlay over everything */
  .game::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 3px,
      rgba(0, 0, 0, 0.12) 3px,
      rgba(0, 0, 0, 0.12) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  /* ============================================
     HOLOGRAM CARDS
     ============================================ */
  .holo-card {
    position: absolute;
    z-index: 5;
    display: flex;
    flex-direction: column;
  }

  .holo-player {
    bottom: 24%;
    left: 7%;
    width: 26%;
    aspect-ratio: 3 / 4;
    transform: perspective(1000px) rotateY(6deg);
    animation: floatPlayer 3s ease-in-out infinite;
  }

  .holo-enemy {
    top: 14%;
    right: 9%;
    width: 22%;
    aspect-ratio: 3 / 4;
    transform: perspective(1000px) rotateY(-6deg);
    animation: floatEnemy 3s ease-in-out infinite 1.5s;
  }

  @keyframes floatPlayer {
    0%, 100% { transform: perspective(1000px) rotateY(6deg) translateY(0); }
    50% { transform: perspective(1000px) rotateY(6deg) translateY(-7px); }
  }
  @keyframes floatEnemy {
    0%, 100% { transform: perspective(1000px) rotateY(-6deg) translateY(0); }
    50% { transform: perspective(1000px) rotateY(-6deg) translateY(-6px); }
  }

  .holo-frame {
    position: relative;
    flex: 1;
    background:
      linear-gradient(180deg,
        rgba(20, 8, 40, 0.88) 0%,
        rgba(40, 15, 80, 0.95) 100%);
    border: 2px solid var(--neon-pink);
    box-shadow:
      0 0 25px var(--glow-pink),
      inset 0 0 20px rgba(255, 77, 255, 0.25);
    overflow: hidden;
  }

  .holo-enemy .holo-frame {
    border-color: var(--neon-cyan);
    box-shadow:
      0 0 25px var(--glow-cyan),
      inset 0 0 20px rgba(0, 229, 255, 0.25);
  }

  /* Corner brackets */
  .holo-frame::before,
  .holo-frame::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border: 2px solid var(--neon-pink);
    z-index: 3;
  }
  .holo-enemy .holo-frame::before,
  .holo-enemy .holo-frame::after {
    border-color: var(--neon-cyan);
  }
  .holo-frame::before {
    top: 4px; left: 4px;
    border-right: none; border-bottom: none;
  }
  .holo-frame::after {
    bottom: 4px; right: 4px;
    border-left: none; border-top: none;
  }

  /* Holo banner */
  .holo-banner {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 7px 10px;
    background: linear-gradient(90deg,
      rgba(157, 77, 255, 0.9),
      rgba(255, 77, 255, 0.75));
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(7px, 0.8vw, 10px);
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
    z-index: 4;
    border-bottom: 1px solid rgba(255,255,255,0.3);
  }
  .holo-enemy .holo-banner {
    background: linear-gradient(90deg,
      rgba(0, 100, 200, 0.9),
      rgba(0, 229, 255, 0.75));
  }
  .banner-id { opacity: 0.9; font-size: 0.85em; }

  /* ============================================
     SPRITE CONTAINER - with AGGRESSIVE ZOOM
     ============================================ */
  .holo-sprite {
    position: absolute;
    inset: 32px 6px 82px 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    z-index: 2;
  }

  .holo-sprite img {
    /* Zoom moderado: se ve el personaje completo con aire.
       1.8 = sweet spot entre cropear padding y ver todo el cuerpo. */
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    transform: scale(1.8);
    transform-origin: center 55%;
    filter: drop-shadow(0 0 8px rgba(255, 77, 255, 0.5));
    animation: idleGlitchPlayer 4s infinite steps(1);
  }

  .holo-enemy .holo-sprite img {
    filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.5));
    animation: idleGlitchEnemy 4.7s infinite steps(1);
  }

  /* ============================================
     IDLE GLITCH (holographic interference)
     Runs constantly — micro-glitches every few seconds
     Uses steps(1) so it JUMPS between states instead of easing
     ============================================ */
  @keyframes idleGlitchPlayer {
    0%, 100%    { transform: scale(1.8) translate(0, 0);
                  filter: drop-shadow(0 0 8px rgba(255, 77, 255, 0.5)); }
    /* Glitch burst 1 — around 18% */
    18%         { transform: scale(1.8) translate(-2px, 0);
                  filter: drop-shadow(2px 0 0 rgba(0, 229, 255, 0.8))
                          drop-shadow(-2px 0 0 rgba(255, 77, 255, 0.8))
                          brightness(1.2); }
    19%         { transform: scale(1.8) translate(2px, 0);
                  filter: drop-shadow(0 0 8px rgba(255, 77, 255, 0.5)); }
    /* Glitch burst 2 — around 55% */
    55%         { transform: scale(1.8) translate(0, -1px);
                  filter: drop-shadow(0 2px 0 rgba(255, 77, 255, 0.8))
                          drop-shadow(0 -2px 0 rgba(0, 229, 255, 0.8))
                          hue-rotate(30deg); }
    56%         { transform: scale(1.8) translate(0, 0);
                  filter: drop-shadow(0 0 8px rgba(255, 77, 255, 0.5)); }
    /* Glitch burst 3 — around 82% */
    82%         { transform: scale(1.78) translate(1px, 0);
                  filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.9))
                          brightness(1.4); }
    83%         { transform: scale(1.8) translate(0, 0);
                  filter: drop-shadow(0 0 8px rgba(255, 77, 255, 0.5)); }
  }

  @keyframes idleGlitchEnemy {
    0%, 100%    { transform: scale(1.8) translate(0, 0);
                  filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.5)); }
    22%         { transform: scale(1.8) translate(2px, 0);
                  filter: drop-shadow(-2px 0 0 rgba(255, 77, 255, 0.8))
                          drop-shadow(2px 0 0 rgba(0, 229, 255, 0.8))
                          brightness(1.2); }
    23%         { transform: scale(1.8) translate(-1px, 0);
                  filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.5)); }
    48%         { transform: scale(1.8) translate(0, 1px);
                  filter: drop-shadow(0 -2px 0 rgba(0, 229, 255, 0.8))
                          drop-shadow(0 2px 0 rgba(157, 77, 255, 0.8))
                          hue-rotate(-30deg); }
    49%         { transform: scale(1.8) translate(0, 0);
                  filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.5)); }
    77%         { transform: scale(1.82) translate(-1px, 0);
                  filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.9))
                          brightness(1.4); }
    78%         { transform: scale(1.8) translate(0, 0);
                  filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.5)); }
  }

  /* Scanlines inside holo */
  .holo-sprite::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 2px,
      rgba(255, 77, 255, 0.1) 2px,
      rgba(255, 77, 255, 0.1) 3px
    );
    pointer-events: none;
    z-index: 3;
    animation: scanDrift 6s linear infinite;
  }
  .holo-enemy .holo-sprite::before {
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 2px,
      rgba(0, 229, 255, 0.1) 2px,
      rgba(0, 229, 255, 0.1) 3px
    );
  }
  @keyframes scanDrift {
    0% { transform: translateY(0); }
    100% { transform: translateY(6px); }
  }

  /* Holo beam */
  .holo-beam {
    position: absolute;
    bottom: -35%;
    left: 10%;
    right: 10%;
    height: 45%;
    background: linear-gradient(180deg,
      rgba(255, 77, 255, 0.35) 0%,
      transparent 100%);
    clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%);
    z-index: -1;
    filter: blur(2px);
    animation: beamFlicker 3s ease-in-out infinite;
  }
  .holo-enemy .holo-beam {
    background: linear-gradient(180deg,
      rgba(0, 229, 255, 0.35) 0%,
      transparent 100%);
  }
  @keyframes beamFlicker {
    0%, 100% { opacity: 0.8; }
    45%, 55% { opacity: 0.5; }
    50% { opacity: 0.9; }
  }

  /* HP footer (bottom of card, as default) */
  .holo-footer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 10px 10px 8px 10px;
    background: linear-gradient(180deg,
      rgba(10, 5, 20, 0.7) 0%,
      rgba(10, 5, 20, 0.97) 100%);
    backdrop-filter: blur(4px);
    border-top: 1px solid var(--neon-pink);
    z-index: 4;
  }
  .holo-enemy .holo-footer {
    border-top-color: var(--neon-cyan);
  }

  .holo-name-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 5px;
  }

  .holo-name {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 1vw, 12px);
    color: var(--text);
    letter-spacing: 1px;
  }

  .holo-level {
    font-family: 'VT323', monospace;
    font-size: clamp(12px, 1.4vw, 18px);
    color: var(--neon-pink);
  }
  .holo-enemy .holo-level { color: var(--neon-cyan); }

  .hp-row { display: flex; align-items: center; gap: 6px; }

  .hp-tag {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(6px, 0.7vw, 8px);
    color: var(--neon-pink);
    letter-spacing: 1px;
  }
  .holo-enemy .hp-tag { color: var(--neon-cyan); }

  .hp-bar-outer {
    flex: 1;
    height: 8px;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(255, 77, 255, 0.4);
    position: relative;
    overflow: hidden;
  }
  .holo-enemy .hp-bar-outer {
    border-color: rgba(0, 229, 255, 0.4);
  }

  .hp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #00ff9f, #00cc7f);
    box-shadow: 0 0 8px var(--hp-green);
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
    position: relative;
  }
  .hp-bar-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0 4px,
      rgba(0, 0, 0, 0.3) 4px 5px
    );
  }
  .hp-bar-fill.medium {
    background: linear-gradient(90deg, #ffcc00, #ff9900);
    box-shadow: 0 0 8px var(--hp-yellow);
  }
  .hp-bar-fill.low {
    background: linear-gradient(90deg, #ff3864, #ff0044);
    box-shadow: 0 0 10px var(--hp-red);
    animation: hpBlink 0.6s infinite;
  }
  @keyframes hpBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .hp-number {
    font-family: 'VT323', monospace;
    font-size: clamp(11px, 1.2vw, 15px);
    color: var(--hp-green);
    min-width: 55px;
    text-align: right;
  }

  /* Damage popup */
  .damage-popup {
    position: absolute;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(18px, 2.6vw, 32px);
    color: #fff;
    text-shadow:
      -2px -2px 0 #000, 2px -2px 0 #000,
      -2px 2px 0 #000, 2px 2px 0 #000,
      0 0 14px #ff3864;
    pointer-events: none;
    opacity: 0;
    z-index: 15;
    top: 35%;
    left: 50%;
    transform: translate(-50%, 0);
  }
  .damage-popup.crit {
    color: #ffe858;
    text-shadow:
      -2px -2px 0 #000, 2px -2px 0 #000,
      -2px 2px 0 #000, 2px 2px 0 #000,
      0 0 14px #ffcc00;
  }
  .damage-popup.heal {
    color: #78f878;
    text-shadow:
      -2px -2px 0 #000, 2px -2px 0 #000,
      -2px 2px 0 #000, 2px 2px 0 #000,
      0 0 14px #00ff9f;
  }
  .damage-popup.show { animation: dmgPop 1s ease-out forwards; }
  @keyframes dmgPop {
    0% { opacity: 0; transform: translate(-50%, 10px) scale(0.6); }
    15% { opacity: 1; transform: translate(-50%, -20px) scale(1.3); }
    70% { opacity: 1; transform: translate(-50%, -50px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -80px) scale(0.9); }
  }

  /* Hit states */
  .holo-card.hit .holo-sprite img {
    animation: hitGlitch 0.4s steps(3);
  }
  @keyframes hitGlitch {
    0%, 100% { filter: hue-rotate(0deg) brightness(1); }
    33% { filter: hue-rotate(180deg) brightness(2) invert(1); }
    66% { filter: hue-rotate(90deg) brightness(1.5); }
  }

  .holo-card.hit .holo-frame {
    animation: frameShake 0.4s;
  }
  @keyframes frameShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .holo-card.attacking-player { animation: atkPlayer 0.6s ease-in-out !important; }
  @keyframes atkPlayer {
    0%, 100% { transform: perspective(1000px) rotateY(6deg) translate(0, 0); }
    40%, 60% { transform: perspective(1000px) rotateY(6deg) translate(90px, -50px) scale(1.12); }
  }

  .holo-card.attacking-enemy { animation: atkEnemy 0.6s ease-in-out !important; }
  @keyframes atkEnemy {
    0%, 100% { transform: perspective(1000px) rotateY(-6deg) translate(0, 0); }
    40%, 60% { transform: perspective(1000px) rotateY(-6deg) translate(-70px, 50px) scale(1.12); }
  }

  .holo-card.fainted { animation: faintAnim 1.2s forwards !important; }
  @keyframes faintAnim {
    0% { opacity: 1; filter: none; }
    30% { opacity: 1; filter: hue-rotate(120deg) brightness(2); }
    100% { opacity: 0; filter: blur(8px) brightness(0); transform: scale(0.6) translateY(40px); }
  }

  /* ============================================
     DIGITAL TERMINATION SEQUENCE
     Dramatic death animation for when a dev is KO'd
     Multi-stage: glitch → disintegration → fade
     ============================================ */
  .holo-card.terminating .holo-frame {
    animation: terminatingFrame 2s forwards;
  }
  @keyframes terminatingFrame {
    0% {
      filter: none;
      box-shadow: 0 0 25px var(--glow-cyan);
    }
    15% {
      filter: hue-rotate(180deg) saturate(3);
      box-shadow: 0 0 50px #fff, 0 0 80px var(--hp-red);
      transform: translate(-6px, 2px);
    }
    17% { transform: translate(6px, -3px); }
    19% { transform: translate(-4px, 4px); }
    21% {
      transform: translate(5px, -2px);
      filter: hue-rotate(-90deg) saturate(4) brightness(2);
    }
    23% { transform: translate(0, 0); }
    40% {
      filter: hue-rotate(60deg) brightness(1.5);
      box-shadow: 0 0 40px var(--hp-red);
    }
    70% {
      opacity: 0.8;
      filter: hue-rotate(0deg) blur(2px);
      transform: scale(0.98);
    }
    100% {
      opacity: 0;
      filter: blur(20px) brightness(0);
      transform: scale(0.3) translateY(60px);
    }
  }

  .holo-card.terminating .holo-sprite img {
    animation: terminatingSprite 2s forwards !important;
  }
  @keyframes terminatingSprite {
    0% {
      transform: scale(1.8);
      filter: none;
    }
    10% {
      transform: scale(1.8) translate(-6px, 0);
      filter:
        drop-shadow(6px 0 0 var(--neon-cyan))
        drop-shadow(-6px 0 0 var(--hp-red))
        brightness(1.5);
    }
    12% {
      transform: scale(1.8) translate(6px, -2px);
      filter:
        drop-shadow(-8px 0 0 var(--neon-cyan))
        drop-shadow(8px 0 0 var(--hp-red))
        brightness(2);
    }
    14% {
      transform: scale(1.82) translate(-4px, 3px);
      filter:
        drop-shadow(4px 0 0 var(--neon-pink))
        drop-shadow(-4px 0 0 var(--neon-cyan))
        contrast(2)
        brightness(1.8);
    }
    16% {
      transform: scale(1.8) translate(5px, 0);
      filter: invert(1) brightness(2);
    }
    18% {
      transform: scale(1.85) translate(-3px, 2px);
      filter: hue-rotate(180deg) brightness(1.8);
    }
    25% {
      transform: scale(1.8) translate(0, 0);
      filter: brightness(1.5) saturate(2);
    }
    50% {
      transform: scale(1.7) translate(0, 10%);
      filter: blur(1px) brightness(0.8);
      opacity: 0.8;
    }
    80% {
      transform: scale(1.3) translate(0, 30%);
      filter: blur(6px) brightness(0.3);
      opacity: 0.3;
    }
    100% {
      transform: scale(0.5) translate(0, 60%);
      filter: blur(15px) brightness(0);
      opacity: 0;
    }
  }

  /* Glitch bars — vertical stripes that scan across during termination */
  .termination-bars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    overflow: hidden;
    opacity: 0;
  }
  .termination-bars.active {
    animation: barsShow 0.6s ease-out;
  }
  @keyframes barsShow {
    0% { opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }

  .term-bar {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 8px;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.9),
      transparent
    );
    mix-blend-mode: screen;
    animation: barSweep 0.4s linear forwards;
  }
  @keyframes barSweep {
    0% { transform: translateX(-20px); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(calc(100% + 20px)); opacity: 0; }
  }

  /* Data particles bursting outward from the sprite */
  .term-particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 6;
    overflow: visible;
  }

  .term-particle {
    position: absolute;
    left: 50%;
    top: 50%;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px currentColor;
    pointer-events: none;
    animation: particleBurst 1.2s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes particleBurst {
    0% {
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
    }
    10% {
      opacity: 1;
      transform:
        translate(calc(-50% + var(--dx) * 0.2), calc(-50% + var(--dy) * 0.2))
        scale(1);
    }
    100% {
      transform:
        translate(calc(-50% + var(--dx)), calc(-50% + var(--dy)))
        scale(0.3)
        rotate(var(--rot, 180deg));
      opacity: 0;
    }
  }

  /* Final explosion flash behind the card */
  .term-flash {
    position: absolute;
    inset: -20%;
    background: radial-gradient(
      circle at center,
      rgba(255, 255, 255, 0.9) 0%,
      rgba(0, 229, 255, 0.6) 20%,
      rgba(255, 77, 255, 0.3) 40%,
      transparent 70%
    );
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    mix-blend-mode: screen;
  }
  .term-flash.active {
    animation: termFlashAnim 0.8s ease-out;
  }
  @keyframes termFlashAnim {
    0% { opacity: 0; transform: scale(0.3); }
    30% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.4); }
  }

  /* Shockwave ring around the card */
  .term-shockwave {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 40px;
    height: 40px;
    border: 3px solid var(--hp-red);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 4;
    opacity: 0;
  }
  .term-shockwave.active {
    animation: shockwave 1s ease-out forwards;
  }
  @keyframes shockwave {
    0% {
      opacity: 1;
      width: 40px;
      height: 40px;
      border-width: 4px;
    }
    100% {
      opacity: 0;
      width: 600px;
      height: 600px;
      border-width: 1px;
    }
  }

  /* Top HUD */
  .hud-top {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    z-index: 10;
    pointer-events: none;
  }

  .hud-chip {
    background: rgba(10, 5, 20, 0.85);
    border: 1px solid var(--neon-violet);
    padding: 5px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text);
    letter-spacing: 1px;
    box-shadow: 0 0 10px rgba(157, 77, 255, 0.3);
  }
  .hud-chip strong { color: var(--neon-pink); }
  .hud-chip.green strong { color: var(--hp-green); }
  .hud-chip.cyan strong { color: var(--neon-cyan); }

  .hud-brand {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--neon-pink);
    text-shadow: 0 0 8px var(--glow-pink);
    letter-spacing: 2px;
  }
  .hud-brand::before { content: '◢ '; color: var(--neon-cyan); }

  /* Sound toggle button */
  .sound-btn {
    background: rgba(10, 5, 20, 0.85);
    border: 1px solid var(--neon-violet);
    padding: 4px 8px;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(157, 77, 255, 0.3);
    pointer-events: auto;
    transition: all 0.15s;
    line-height: 1;
  }
  .sound-btn:hover {
    border-color: var(--neon-pink);
    box-shadow: 0 0 15px var(--glow-pink);
  }
  .sound-btn.muted {
    opacity: 0.5;
    filter: grayscale(1);
  }

  /* Bottom HUD */
  .bottom-hud {
    position: absolute;
    bottom: 12px;
    left: 12px;
    right: 12px;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 12px;
    z-index: 20;
  }

  .dialog-box {
    background: rgba(10, 5, 20, 0.94);
    border: 2px solid var(--neon-pink);
    box-shadow:
      0 0 20px rgba(255, 77, 255, 0.3),
      inset 0 0 15px rgba(157, 77, 255, 0.15);
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 100px;
    position: relative;
  }
  .dialog-box::before, .dialog-box::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border: 2px solid var(--neon-pink);
  }
  .dialog-box::before {
    top: 4px; left: 4px;
    border-right: none; border-bottom: none;
  }
  .dialog-box::after {
    bottom: 4px; right: 4px;
    border-left: none; border-top: none;
  }

  .dialog-header {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--neon-cyan);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .dialog-header::before { content: '> '; }

  .dialog-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(11px, 1.3vw, 15px);
    color: var(--text);
    line-height: 1.6;
    font-weight: 500;
  }

  .dialog-cursor {
    display: inline-block;
    color: var(--neon-pink);
    animation: cursorBlink 0.6s infinite;
    margin-left: 4px;
  }
  @keyframes cursorBlink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  .actions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
  }

  .btn {
    position: relative;
    background: linear-gradient(180deg,
      rgba(30, 12, 60, 0.95),
      rgba(15, 6, 30, 0.95));
    border: 2px solid var(--neon-pink);
    padding: 10px 12px;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 0.9vw, 11px);
    color: var(--text);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    letter-spacing: 1px;
    transition: all 0.15s;
    box-shadow: 0 0 10px rgba(255, 77, 255, 0.2);
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--neon-pink);
    box-shadow: 0 0 6px var(--neon-pink);
  }
  .btn:hover:not(:disabled) {
    background: linear-gradient(180deg,
      rgba(60, 20, 100, 0.95),
      rgba(30, 10, 60, 0.95));
    box-shadow: 0 0 20px rgba(255, 77, 255, 0.5);
    transform: translateY(-1px);
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }

  .btn.yellow { border-color: var(--hp-yellow); box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }
  .btn.yellow::before { background: var(--hp-yellow); box-shadow: 0 0 6px var(--hp-yellow); }
  .btn.yellow:hover:not(:disabled) { box-shadow: 0 0 20px rgba(255, 204, 0, 0.5); }

  .btn.green { border-color: var(--hp-green); box-shadow: 0 0 10px rgba(0, 255, 159, 0.2); }
  .btn.green::before { background: var(--hp-green); box-shadow: 0 0 6px var(--hp-green); }
  .btn.green:hover:not(:disabled) { box-shadow: 0 0 20px rgba(0, 255, 159, 0.5); }

  .btn.cyan { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
  .btn.cyan::before { background: var(--neon-cyan); box-shadow: 0 0 6px var(--neon-cyan); }
  .btn.cyan:hover:not(:disabled) { box-shadow: 0 0 20px rgba(0, 229, 255, 0.5); }

  .btn-name { font-weight: 800; text-transform: uppercase; }
  .btn-sub {
    font-family: 'VT323', monospace;
    font-size: clamp(11px, 1.2vw, 14px);
    opacity: 0.8;
    margin-top: 3px;
    letter-spacing: 0.5px;
    font-weight: 400;
  }

  /* ============================================
     COMBAT FEEDBACK
     Two distinct effects:
     - Offensive (I attack): clean shake of whole game, no color
     - Defensive (I get hit): heavy shake + red tint overlay
     ============================================ */

  /* Shake the whole game viewport */
  .game.shake-soft {
    animation: shakeSoft 0.35s;
  }
  @keyframes shakeSoft {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-3px, 2px); }
    40% { transform: translate(3px, -2px); }
    60% { transform: translate(-2px, -2px); }
    80% { transform: translate(2px, 2px); }
  }

  .game.shake-hard {
    animation: shakeHard 0.5s;
  }
  @keyframes shakeHard {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-8px, 4px) rotate(-0.5deg); }
    20% { transform: translate(8px, -5px) rotate(0.5deg); }
    30% { transform: translate(-6px, 5px); }
    40% { transform: translate(7px, -3px) rotate(-0.3deg); }
    50% { transform: translate(-5px, 4px); }
    60% { transform: translate(6px, -4px) rotate(0.3deg); }
    70% { transform: translate(-4px, 3px); }
    80% { transform: translate(3px, -2px); }
    90% { transform: translate(-2px, 1px); }
  }

  /* Red tint overlay — shown only when I get hit */
  .red-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse at center,
      rgba(255, 56, 100, 0.15) 0%,
      rgba(255, 56, 100, 0.55) 100%
    );
    opacity: 0;
    pointer-events: none;
    z-index: 49;
    mix-blend-mode: normal;
  }
  .red-overlay.active {
    animation: redPulse 0.6s ease-out;
  }
  @keyframes redPulse {
    0% { opacity: 0; }
    15% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Vignette red border that pulses inward — sells the "damage taken" feeling */
  .red-vignette {
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 0 0 rgba(255, 56, 100, 0);
    pointer-events: none;
    z-index: 48;
  }
  .red-vignette.active {
    animation: vignettePulse 0.6s ease-out;
  }
  @keyframes vignettePulse {
    0% {
      box-shadow: inset 0 0 0 0 rgba(255, 56, 100, 0);
    }
    20% {
      box-shadow: inset 0 0 120px 40px rgba(255, 56, 100, 0.9);
    }
    100% {
      box-shadow: inset 0 0 0 0 rgba(255, 56, 100, 0);
    }
  }

  /* ============================================
     DEV MATERIALIZE ANIMATION
     When a new dev is deployed, sprite builds up
     from pixelated data rather than just appearing
     ============================================ */

  /* Holo-card playing the summon animation */
  .holo-card.materializing .holo-frame {
    animation: frameBoot 0.8s ease-out;
  }
  @keyframes frameBoot {
    0% {
      opacity: 0.3;
      box-shadow: 0 0 60px var(--neon-pink);
      border-color: #fff;
    }
    50% {
      opacity: 1;
      box-shadow: 0 0 50px var(--neon-pink);
    }
    100% {
      opacity: 1;
    }
  }

  /* Sprite materialization: scale up from bottom + pixelate + glitch */
  .holo-card.materializing .holo-sprite img {
    animation: spriteMaterialize 1.2s ease-out !important;
  }
  @keyframes spriteMaterialize {
    0% {
      opacity: 0;
      transform: scale(1.8) translate(0, 40%);
      filter:
        blur(8px)
        contrast(3)
        hue-rotate(180deg)
        brightness(2);
    }
    20% {
      opacity: 0.4;
      transform: scale(1.8) translate(-3px, 20%);
      filter:
        blur(4px)
        contrast(2)
        drop-shadow(4px 0 0 rgba(0, 229, 255, 0.9))
        drop-shadow(-4px 0 0 rgba(255, 77, 255, 0.9));
    }
    40% {
      opacity: 0.7;
      transform: scale(1.8) translate(3px, 5%);
      filter:
        blur(2px)
        drop-shadow(2px 0 0 rgba(0, 229, 255, 0.7))
        drop-shadow(-2px 0 0 rgba(255, 77, 255, 0.7));
    }
    60% {
      opacity: 0.9;
      transform: scale(1.8) translate(-1px, 0);
      filter:
        blur(1px)
        brightness(1.4);
    }
    80% {
      opacity: 1;
      transform: scale(1.8) translate(1px, 0);
      filter: brightness(1.2);
    }
    100% {
      opacity: 1;
      transform: scale(1.8) translate(0, 0);
      filter: drop-shadow(0 0 8px rgba(255, 77, 255, 0.5));
    }
  }

  /* Vertical code-stream overlay that scans over the sprite */
  .materialize-code {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
    overflow: hidden;
    opacity: 0;
  }
  .materialize-code.active {
    animation: codeFadeOut 1.2s ease-out forwards;
  }
  @keyframes codeFadeOut {
    0% { opacity: 1; }
    70% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  .code-line {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      var(--neon-cyan) 20%,
      #fff 50%,
      var(--neon-pink) 80%,
      transparent 100%
    );
    box-shadow: 0 0 8px var(--neon-cyan);
    animation: codeLineMove linear forwards;
  }

  @keyframes codeLineMove {
    0% { top: -5%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 105%; opacity: 0; }
  }

  /* Pixelation grid overlay during materialize */
  .materialize-grid {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    background-image:
      linear-gradient(rgba(0, 229, 255, 0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 77, 255, 0.3) 1px, transparent 1px);
    background-size: 12px 12px;
    opacity: 0;
  }
  .materialize-grid.active {
    animation: gridFade 1.2s ease-out forwards;
  }
  @keyframes gridFade {
    0% { opacity: 0.9; background-size: 8px 8px; }
    50% { opacity: 0.5; background-size: 16px 16px; }
    100% { opacity: 0; background-size: 40px 40px; }
  }

  /* Expanding ring on the platform when dev arrives (DOM, not three.js) */
  .materialize-ring {
    position: absolute;
    left: 50%;
    bottom: -10%;
    width: 20px;
    height: 10px;
    border: 3px solid var(--neon-pink);
    border-radius: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 1;
    opacity: 0;
  }
  .materialize-ring.active {
    animation: ringExpand 1s ease-out forwards;
  }
  @keyframes ringExpand {
    0% {
      opacity: 1;
      width: 20px;
      height: 10px;
      border-width: 3px;
    }
    100% {
      opacity: 0;
      width: 300px;
      height: 150px;
      border-width: 1px;
    }
  }

  /* ============================================
     VICTORY / DEFEAT OVERLAY
     Dramatic fullscreen screen at end of match
     ============================================ */
  .result-overlay {
    position: absolute;
    inset: 0;
    background: rgba(5, 0, 16, 0.92);
    backdrop-filter: blur(10px);
    z-index: 70;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .result-overlay.active { display: flex; animation: overlayFadeIn 0.4s ease-out; }

  @keyframes overlayFadeIn {
    from { opacity: 0; backdrop-filter: blur(0); }
    to { opacity: 1; backdrop-filter: blur(10px); }
  }

  /* Scanlines on top of overlay */
  .result-overlay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 3px,
      rgba(0, 0, 0, 0.25) 3px,
      rgba(0, 0, 0, 0.25) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  /* Massive title text */
  .result-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(36px, 8vw, 96px);
    letter-spacing: clamp(4px, 1vw, 12px);
    color: var(--hp-green);
    text-shadow:
      0 0 20px var(--hp-green),
      0 0 40px var(--hp-green),
      0 0 80px var(--hp-green),
      4px 4px 0 #000;
    margin-bottom: 24px;
    position: relative;
    z-index: 3;
    animation: titleSlam 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .result-title.defeat {
    color: var(--hp-red);
    text-shadow:
      0 0 20px var(--hp-red),
      0 0 40px var(--hp-red),
      0 0 80px var(--hp-red),
      4px 4px 0 #000;
  }

  @keyframes titleSlam {
    0% { opacity: 0; transform: scale(3) rotate(-8deg); filter: blur(20px); }
    60% { opacity: 1; transform: scale(0.9) rotate(2deg); filter: blur(0); }
    80% { transform: scale(1.05) rotate(-1deg); }
    100% { transform: scale(1) rotate(0); }
  }

  /* Glitch effect on title — multiple copies offset */
  .result-title::before,
  .result-title::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    mix-blend-mode: screen;
    opacity: 0.8;
  }
  .result-title::before {
    color: var(--neon-pink);
    animation: glitchShift1 2s infinite steps(1);
  }
  .result-title::after {
    color: var(--neon-cyan);
    animation: glitchShift2 2s infinite steps(1);
  }
  @keyframes glitchShift1 {
    0%, 100% { transform: translate(0, 0); opacity: 0; }
    10% { transform: translate(-3px, 1px); opacity: 0.8; }
    11% { transform: translate(0, 0); opacity: 0; }
    60% { transform: translate(-4px, -1px); opacity: 0.6; }
    62% { transform: translate(0, 0); opacity: 0; }
  }
  @keyframes glitchShift2 {
    0%, 100% { transform: translate(0, 0); opacity: 0; }
    10% { transform: translate(3px, -1px); opacity: 0.8; }
    11% { transform: translate(0, 0); opacity: 0; }
    60% { transform: translate(4px, 1px); opacity: 0.6; }
    62% { transform: translate(0, 0); opacity: 0; }
  }

  /* Stats panel */
  .result-stats {
    background: rgba(10, 5, 20, 0.95);
    border: 2px solid var(--neon-pink);
    padding: 20px 32px;
    margin-bottom: 24px;
    box-shadow: 0 0 30px var(--glow-pink);
    position: relative;
    z-index: 3;
    animation: statsSlideUp 0.6s 0.4s ease-out backwards;
    min-width: 360px;
  }

  .result-overlay.defeat .result-stats {
    border-color: var(--hp-red);
    box-shadow: 0 0 30px var(--hp-red);
  }

  @keyframes statsSlideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-stats::before,
  .result-stats::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border: 2px solid var(--neon-pink);
  }
  .result-stats::before { top: 4px; left: 4px; border-right: none; border-bottom: none; }
  .result-stats::after { bottom: 4px; right: 4px; border-left: none; border-top: none; }
  .result-overlay.defeat .result-stats::before,
  .result-overlay.defeat .result-stats::after {
    border-color: var(--hp-red);
  }

  .stats-row-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(12px, 1.2vw, 15px);
    padding: 8px 0;
    border-bottom: 1px dashed rgba(255, 77, 255, 0.2);
  }
  .stats-row-item:last-child { border-bottom: none; }
  .stats-row-item .label {
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 0.85em;
  }
  .stats-row-item .value {
    color: var(--text);
    font-weight: 700;
  }
  .stats-row-item .value.gain { color: var(--hp-green); text-shadow: 0 0 8px var(--hp-green); }
  .stats-row-item .value.loss { color: var(--hp-red); text-shadow: 0 0 8px var(--hp-red); }

  /* Continue button */
  .result-btn {
    background: linear-gradient(180deg,
      rgba(255, 77, 255, 0.25),
      rgba(157, 77, 255, 0.25));
    border: 2px solid var(--neon-pink);
    padding: 14px 36px;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(11px, 1.2vw, 14px);
    color: var(--text);
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 0 20px var(--glow-pink);
    position: relative;
    z-index: 3;
    animation: btnAppear 0.5s 0.9s ease-out backwards;
    text-transform: uppercase;
  }
  .result-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px var(--glow-pink);
    background: linear-gradient(180deg,
      rgba(255, 77, 255, 0.4),
      rgba(157, 77, 255, 0.4));
  }
  .result-overlay.defeat .result-btn {
    border-color: var(--hp-red);
    box-shadow: 0 0 20px var(--hp-red);
    background: linear-gradient(180deg,
      rgba(255, 56, 100, 0.25),
      rgba(200, 30, 70, 0.25));
  }
  .result-overlay.defeat .result-btn:hover {
    box-shadow: 0 0 30px var(--hp-red);
    background: linear-gradient(180deg,
      rgba(255, 56, 100, 0.4),
      rgba(200, 30, 70, 0.4));
  }

  @keyframes btnAppear {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Radial burst effect behind title */
  .result-burst {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120%;
    aspect-ratio: 1;
    transform: translate(-50%, -50%);
    background: radial-gradient(
      circle at center,
      rgba(0, 255, 159, 0.3) 0%,
      rgba(0, 229, 255, 0.2) 20%,
      transparent 50%
    );
    animation: burstPulse 2s ease-out infinite;
    pointer-events: none;
    z-index: 1;
  }
  .result-overlay.defeat .result-burst {
    background: radial-gradient(
      circle at center,
      rgba(255, 56, 100, 0.3) 0%,
      rgba(157, 77, 255, 0.2) 20%,
      transparent 50%
    );
  }
  @keyframes burstPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.9; }
  }

  /* ============================================
     CARROT RAIN — falling carrots on top of everything
     ============================================ */
  .carrot-rain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 75;
  }

  .carrot {
    position: absolute;
    font-size: 28px;
    top: -40px;
    animation: carrotFall linear forwards;
    filter: brightness(1.2);
    will-change: transform;
    user-select: none;
  }

  .carrot.pink {
    color: var(--neon-pink);
    text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
  }
  .carrot.cyan {
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
  }
  .carrot.violet {
    color: var(--neon-violet);
    text-shadow: 0 0 10px var(--neon-violet), 0 0 20px var(--neon-violet);
  }

  @keyframes carrotFall {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: 0;
    }
    10% {
      opacity: 1;
    }
    90% {
      opacity: 1;
    }
    100% {
      transform: translateY(var(--fall-distance, 800px)) rotate(var(--rotation, 360deg));
      opacity: 0;
    }
  }

  /* The carrots are pure unicode — apply color filter so emoji white/orange becomes neon */
  .carrot-glyph {
    display: inline-block;
    /* Re-tint orange emoji via CSS filter stack */
    filter:
      grayscale(1)
      brightness(1.8)
      drop-shadow(0 0 8px currentColor);
    mix-blend-mode: screen;
  }
  .squad-modal {
    position: absolute;
    inset: 0;
    background: rgba(5, 0, 16, 0.85);
    backdrop-filter: blur(8px);
    z-index: 60;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .squad-modal.active { display: flex; }

  .squad-modal::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 3px,
      rgba(255, 77, 255, 0.05) 3px,
      rgba(255, 77, 255, 0.05) 4px
    );
    pointer-events: none;
  }

  .squad-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 1.3vw, 15px);
    color: var(--neon-pink);
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-shadow: 0 0 12px var(--glow-pink);
  }
  .squad-title::before { content: '◢ '; color: var(--neon-cyan); }

  .squad-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(10px, 1vw, 12px);
    color: var(--dim);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  .squad-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    max-width: 90%;
    width: 100%;
  }

  .squad-slot {
    position: relative;
    background: linear-gradient(180deg,
      rgba(20, 8, 40, 0.95),
      rgba(10, 5, 20, 0.95));
    border: 2px solid var(--neon-violet);
    aspect-ratio: 3 / 4;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
  }

  .squad-slot::before,
  .squad-slot::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border: 2px solid var(--neon-violet);
    z-index: 3;
    transition: border-color 0.15s;
  }
  .squad-slot::before { top: 3px; left: 3px; border-right: none; border-bottom: none; }
  .squad-slot::after { bottom: 3px; right: 3px; border-left: none; border-top: none; }

  .squad-slot:hover {
    border-color: var(--neon-pink);
    box-shadow: 0 0 20px var(--glow-pink);
    transform: translateY(-4px);
  }
  .squad-slot:hover::before, .squad-slot:hover::after {
    border-color: var(--neon-pink);
  }

  .squad-slot.active {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 20px var(--glow-cyan);
  }
  .squad-slot.active::before, .squad-slot.active::after {
    border-color: var(--neon-cyan);
  }
  .squad-slot.active .slot-badge-active {
    display: block;
  }

  .squad-slot.fainted {
    opacity: 0.4;
    cursor: not-allowed;
    border-color: var(--hp-red);
    filter: grayscale(0.8);
  }
  .squad-slot.fainted:hover {
    transform: none;
    box-shadow: 0 0 12px rgba(255, 56, 100, 0.3);
  }

  .slot-banner {
    padding: 4px 6px;
    background: linear-gradient(90deg,
      rgba(157, 77, 255, 0.9),
      rgba(255, 77, 255, 0.75));
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(5px, 0.55vw, 7px);
    color: #fff;
    letter-spacing: 0.5px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.8);
    display: flex;
    justify-content: space-between;
    z-index: 2;
    border-bottom: 1px solid rgba(255,255,255,0.25);
  }

  .slot-sprite {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slot-sprite img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
    transform: scale(1.7);
    transform-origin: center 55%;
  }

  .slot-sprite::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 2px,
      rgba(255, 77, 255, 0.08) 2px,
      rgba(255, 77, 255, 0.08) 3px
    );
    pointer-events: none;
    z-index: 3;
  }

  .slot-footer {
    padding: 6px 7px 7px 7px;
    background: linear-gradient(180deg,
      rgba(10, 5, 20, 0.8),
      rgba(10, 5, 20, 0.98));
    border-top: 1px solid var(--neon-violet);
    z-index: 2;
  }

  .slot-name {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(6px, 0.7vw, 9px);
    color: var(--text);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .slot-hp-bar {
    height: 4px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255, 77, 255, 0.3);
    position: relative;
    overflow: hidden;
    margin-bottom: 3px;
  }
  .slot-hp-fill {
    height: 100%;
    background: linear-gradient(90deg, #00ff9f, #00cc7f);
    box-shadow: 0 0 4px var(--hp-green);
  }
  .slot-hp-fill.medium { background: linear-gradient(90deg, #ffcc00, #ff9900); box-shadow: 0 0 4px var(--hp-yellow); }
  .slot-hp-fill.low { background: linear-gradient(90deg, #ff3864, #ff0044); box-shadow: 0 0 4px var(--hp-red); }
  .slot-hp-fill.zero { background: #444; box-shadow: none; }

  .slot-stats {
    display: flex;
    justify-content: space-between;
    font-family: 'VT323', monospace;
    font-size: clamp(9px, 1vw, 12px);
    color: var(--dim);
  }
  .slot-stats .lvl { color: var(--neon-pink); }
  .slot-stats .hp-val { color: var(--hp-green); }

  .slot-badge-active {
    display: none;
    position: absolute;
    top: 4px;
    right: 4px;
    background: var(--neon-cyan);
    color: #000;
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    padding: 2px 4px;
    z-index: 4;
    box-shadow: 0 0 8px var(--neon-cyan);
  }

  .slot-badge-fainted {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-10deg);
    background: var(--hp-red);
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 1vw, 12px);
    padding: 4px 8px;
    z-index: 5;
    box-shadow: 0 0 10px var(--hp-red);
    letter-spacing: 1px;
    display: none;
  }
  .squad-slot.fainted .slot-badge-fainted { display: block; }

  .squad-close {
    margin-top: 20px;
    background: rgba(10, 5, 20, 0.9);
    border: 2px solid var(--dim);
    padding: 8px 20px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--text);
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .squad-close:hover {
    border-color: var(--neon-pink);
    box-shadow: 0 0 15px var(--glow-pink);
  }

  .flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    mix-blend-mode: screen;
  }
  .flash.fire { animation: flashAnim 0.3s; }
  @keyframes flashAnim {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.7; }
  }
</style>
</head>
<body>

<div class="game" id="game">

  <!-- Three.js canvas background -->
  <canvas id="bg-canvas"></canvas>

  <!-- TOP HUD -->
  <div class="hud-top">
    <div class="hud-brand">NX ARENA</div>
    <div style="display:flex; gap:8px; align-items:center;">
      <button id="sound-toggle" class="sound-btn" onclick="toggleSound()" title="Toggle sound">🔊</button>
      <div class="hud-chip cyan">TURN <strong id="turn-num">3</strong></div>
      <div class="hud-chip">WAGER <strong>50 $NXT</strong></div>
      <div class="hud-chip green">BAL <strong>1,240</strong></div>
    </div>
  </div>

  <!-- ENEMY HOLOGRAM -->
  <div class="holo-card holo-enemy" id="enemy-holo">
    <div class="holo-frame">
      <div class="holo-banner">
        <span>INFILTRATE // MISTRIAL</span>
        <span class="banner-id">#00196</span>
      </div>
      <div class="holo-sprite">
        <img id="enemy-img" alt="Enemy aNFT">
      </div>
      <div class="holo-footer">
        <div class="holo-name-row">
          <span class="holo-name">ZOMBIE_196</span>
          <span class="holo-level">Lv.42</span>
        </div>
        <div class="hp-row">
          <span class="hp-tag">HP</span>
          <div class="hp-bar-outer">
            <div class="hp-bar-fill" id="enemy-hp" style="width: 88%"></div>
          </div>
          <span class="hp-number" id="enemy-hp-text">186/210</span>
        </div>
      </div>
    </div>
    <div class="holo-beam"></div>
    <div class="damage-popup" id="enemy-dmg">-24</div>
  </div>

  <!-- PLAYER HOLOGRAM -->
  <div class="holo-card holo-player" id="player-holo">
    <div class="holo-frame">
      <div class="holo-banner" id="player-banner">
        <span id="player-corp">AUDIT // MISANTHROPIC</span>
        <span class="banner-id" id="player-id">#00001</span>
      </div>
      <div class="holo-sprite">
        <img id="player-img" alt="Player aNFT">
      </div>
      <div class="holo-footer">
        <div class="holo-name-row">
          <span class="holo-name" id="player-name">ROBOT_001</span>
          <span class="holo-level" id="player-level">Lv.44</span>
        </div>
        <div class="hp-row">
          <span class="hp-tag">HP</span>
          <div class="hp-bar-outer">
            <div class="hp-bar-fill" id="player-hp" style="width: 100%"></div>
          </div>
          <span class="hp-number" id="player-hp-text">280/280</span>
        </div>
      </div>
    </div>
    <div class="holo-beam"></div>
    <div class="damage-popup" id="player-dmg">-0</div>
  </div>

  <!-- BOTTOM HUD -->
  <div class="bottom-hud">
    <div class="dialog-box">
      <div class="dialog-header">COMBAT TERMINAL</div>
      <div class="dialog-text" id="dialog-p">
        What will <span id="active-dev-name">ROBOT_001</span> do?<span class="dialog-cursor">▼</span>
      </div>
    </div>
    <div class="actions-grid">
      <button class="btn" onclick="attack('MERGE_CONFLICT', 32, 'crit')">
        <span class="btn-name">MERGE CONFLICT</span>
        <span class="btn-sub">⚔ 32 DMG · CRIT</span>
      </button>
      <button class="btn yellow" onclick="attack('FORCE_PUSH', 48, 'super')">
        <span class="btn-name">FORCE PUSH</span>
        <span class="btn-sub">⚡ 48 DMG · SUPER</span>
      </button>
      <button class="btn green" onclick="heal()">
        <span class="btn-name">REFACTOR</span>
        <span class="btn-sub">✚ +30 HP</span>
      </button>
      <button class="btn cyan" onclick="swap()">
        <span class="btn-name">SWAP DEV</span>
        <span class="btn-sub">⇄ Change aNFT</span>
      </button>
    </div>
  </div>

  <!-- Squad selection modal -->
  <div class="squad-modal" id="squad-modal">
    <div class="squad-title">SELECT YOUR DEV</div>
    <div class="squad-subtitle">Tap a dev to deploy into the arena</div>
    <div class="squad-grid" id="squad-grid">
      <!-- Slots injected by JS -->
    </div>
    <button class="squad-close" onclick="closeSquad(true)">CANCEL</button>
  </div>

  <!-- Carrot rain layer (only active on victory) -->
  <div class="carrot-rain" id="carrot-rain"></div>

  <!-- Victory / Defeat overlay -->
  <div class="result-overlay" id="result-overlay">
    <div class="result-burst"></div>
    <div class="result-title" id="result-title" data-text="VICTORY">VICTORY</div>
    <div class="result-stats" id="result-stats">
      <!-- Filled dynamically -->
    </div>
    <button class="result-btn" onclick="resetMatch()">CONTINUE</button>
  </div>

  <div class="red-overlay" id="red-overlay"></div>
  <div class="red-vignette" id="red-vignette"></div>
  <div class="flash" id="flash"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================
// THREE.JS DIGITAL ARENA BACKGROUND
// ============================================
(function() {
  const canvas = document.getElementById('bg-canvas');
  const container = document.getElementById('game');

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050010, 0.02);

  const camera = new THREE.PerspectiveCamera(62, 16/10, 0.1, 100);
  camera.position.set(0, 4, 8.5);
  camera.lookAt(0, 0.5, 0);

  const renderer = new THREE.WebGLRenderer({
    canvas: canvas,
    antialias: false,
    alpha: false
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  function resize() {
    const rect = container.getBoundingClientRect();
    renderer.setSize(rect.width, rect.height, false);
    camera.aspect = rect.width / rect.height;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  // ============================================
  // GRID FLOOR (Tron-style)
  // ============================================
  const gridSize = 40;
  const gridDiv = 40;
  const grid = new THREE.GridHelper(gridSize, gridDiv, 0xff4dff, 0x9d4dff);
  grid.position.y = -0.5;
  grid.material.transparent = true;
  grid.material.opacity = 0.35;
  scene.add(grid);

  // Second grid for depth
  const grid2 = new THREE.GridHelper(gridSize, gridDiv, 0x00e5ff, 0x00e5ff);
  grid2.position.y = -0.49;
  grid2.material.transparent = true;
  grid2.material.opacity = 0.15;
  scene.add(grid2);

  // ============================================
  // PLATFORMS (two circular holo platforms)
  // ============================================
  function makePlatform(x, z, color, radius = 2.2) {
    const group = new THREE.Group();

    // Outer glow ring
    const ringGeo = new THREE.RingGeometry(radius * 0.85, radius, 48);
    const ringMat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.8,
      side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = -0.45;
    group.add(ring);

    // Inner ring
    const ringGeo2 = new THREE.RingGeometry(radius * 0.6, radius * 0.7, 48);
    const ring2 = new THREE.Mesh(ringGeo2, ringMat.clone());
    ring2.material.opacity = 0.5;
    ring2.rotation.x = -Math.PI / 2;
    ring2.position.y = -0.44;
    group.add(ring2);

    // Platform disc (semi-transparent)
    const discGeo = new THREE.CircleGeometry(radius * 0.95, 48);
    const discMat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.15,
      side: THREE.DoubleSide
    });
    const disc = new THREE.Mesh(discGeo, discMat);
    disc.rotation.x = -Math.PI / 2;
    disc.position.y = -0.43;
    group.add(disc);

    // Light beam going up
    const beamGeo = new THREE.CylinderGeometry(radius * 0.2, radius * 0.8, 8, 24, 1, true);
    const beamMat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.12,
      side: THREE.DoubleSide,
      depthWrite: false
    });
    const beam = new THREE.Mesh(beamGeo, beamMat);
    beam.position.y = 3.5;
    group.add(beam);

    group.position.set(x, 0, z);
    scene.add(group);

    return { group, ring, ring2, disc, beam };
  }

  // Player platform (bottom-left — aligned under player holo-card)
  const platformPlayer = makePlatform(-4.5, 2.5, 0xff4dff, 2.3);

  // Enemy platform (upper-right, farther back — directly under enemy holo-card)
  const platformEnemy = makePlatform(5.5, -3, 0x00e5ff, 1.5);

  // ============================================
  // PARTICLES (floating digital motes)
  // ============================================
  const particleCount = 250;
  const particleGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  const colors = new Float32Array(particleCount * 3);
  const velocities = [];

  const colorOptions = [
    new THREE.Color(0xff4dff),
    new THREE.Color(0x00e5ff),
    new THREE.Color(0x9d4dff),
    new THREE.Color(0xffffff)
  ];

  for (let i = 0; i < particleCount; i++) {
    positions[i*3] = (Math.random() - 0.5) * 30;
    positions[i*3+1] = Math.random() * 12 - 1;
    positions[i*3+2] = (Math.random() - 0.5) * 25;
    const c = colorOptions[Math.floor(Math.random() * colorOptions.length)];
    colors[i*3] = c.r;
    colors[i*3+1] = c.g;
    colors[i*3+2] = c.b;
    velocities.push({
      y: 0.005 + Math.random() * 0.015,
      x: (Math.random() - 0.5) * 0.003
    });
  }

  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const particleMat = new THREE.PointsMaterial({
    size: 0.08,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);

  // ============================================
  // DIGITAL RAIN — Matrix-style falling glyphs
  // NX-themed: carrots, code snippets, symbols
  // ============================================
  const rainGlyphs = [
    '🥕', '🥕', '🥕',  // carrots (NX brand)
    'git', 'push', 'fn()', 'if', '{}', '[]', '==', '!=',
    '01', '10', '0x', 'NX', '</>', '//', '&&', '||',
    '→', '↯', '⟩', '⟨', '▓', '░', '█', '▒',
    'dev', 'src', 'log', 'api', 'sys', 'err', 'ok',
    'DEPLOY', 'INFILTRATE', 'AUDIT', 'BRIDGE',
    '$', '#', '@', '*', '+', '-', '=', '?',
  ];

  function makeGlyphTexture(text, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0, 0, 0, 0)';
    ctx.fillRect(0, 0, 128, 128);
    ctx.font = 'bold 80px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 20;
    ctx.fillStyle = color;
    ctx.fillText(text, 64, 64);
    ctx.shadowBlur = 0;

    // HOLOGRAM FILTER: re-tint any colored emoji (like 🥕 orange)
    // by using "source-atop" to overlay the neon color only where
    // pixels already exist. This preserves the shape but kills the
    // original emoji colors.
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, 128, 128);
    ctx.globalCompositeOperation = 'source-over';

    const tex = new THREE.CanvasTexture(canvas);
    tex.minFilter = THREE.LinearFilter;
    tex.magFilter = THREE.LinearFilter;
    return tex;
  }

  // Pre-generate textures (cached so we don't recreate per frame)
  const glyphTextures = [];
  const glyphColors = ['#ff4dff', '#00e5ff', '#9d4dff'];
  rainGlyphs.forEach(g => {
    glyphColors.forEach(c => {
      glyphTextures.push(makeGlyphTexture(g, c));
    });
  });

  // Create rain drops as sprite planes
  const rainCount = 60;
  const rainDrops = [];
  for (let i = 0; i < rainCount; i++) {
    const tex = glyphTextures[Math.floor(Math.random() * glyphTextures.length)];
    const mat = new THREE.SpriteMaterial({
      map: tex,
      transparent: true,
      opacity: 0.4 + Math.random() * 0.5,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const sprite = new THREE.Sprite(mat);
    const scale = 0.4 + Math.random() * 0.5;
    sprite.scale.set(scale, scale, 1);
    sprite.position.set(
      (Math.random() - 0.5) * 30,
      Math.random() * 14,
      -4 - Math.random() * 14
    );
    sprite.userData.speed = 0.015 + Math.random() * 0.035;
    sprite.userData.resetY = 10 + Math.random() * 4;
    sprite.userData.bottomY = -2;
    sprite.userData.textureIdx = Math.floor(Math.random() * glyphTextures.length);
    sprite.userData.swapTimer = Math.random() * 3;
    scene.add(sprite);
    rainDrops.push(sprite);
  }

  // ============================================
  // BACKGROUND TOWERS (distant buildings)
  // ============================================
  const towerCount = 12;
  for (let i = 0; i < towerCount; i++) {
    const w = 0.8 + Math.random() * 0.6;
    const h = 3 + Math.random() * 5;
    const geo = new THREE.BoxGeometry(w, h, w);
    const mat = new THREE.MeshBasicMaterial({
      color: 0x1a0530,
      transparent: true,
      opacity: 0.85
    });
    const tower = new THREE.Mesh(geo, mat);
    tower.position.set(
      (Math.random() - 0.5) * 30,
      h / 2 - 1,
      -10 - Math.random() * 8
    );
    scene.add(tower);

    // Tower edge glow
    const edges = new THREE.EdgesGeometry(geo);
    const edgeMat = new THREE.LineBasicMaterial({
      color: Math.random() > 0.5 ? 0xff4dff : 0x00e5ff,
      transparent: true,
      opacity: 0.5
    });
    const line = new THREE.LineSegments(edges, edgeMat);
    line.position.copy(tower.position);
    scene.add(line);
  }

  // ============================================
  // ANIMATION LOOP
  // ============================================
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    const dt = clock.getDelta();

    // Pulse platforms
    platformPlayer.ring.material.opacity = 0.7 + Math.sin(t * 2) * 0.15;
    platformPlayer.ring2.material.opacity = 0.4 + Math.sin(t * 2 + 0.5) * 0.15;
    platformEnemy.ring.material.opacity = 0.7 + Math.sin(t * 2 + Math.PI) * 0.15;
    platformEnemy.ring2.material.opacity = 0.4 + Math.sin(t * 2 + Math.PI + 0.5) * 0.15;

    // Slow platform rotation
    platformPlayer.ring.rotation.z += 0.003;
    platformPlayer.ring2.rotation.z -= 0.005;
    platformEnemy.ring.rotation.z -= 0.004;
    platformEnemy.ring2.rotation.z += 0.006;

    // Particles float up and wrap
    const pos = particleGeo.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
      pos[i*3+1] += velocities[i].y;
      pos[i*3] += velocities[i].x;
      if (pos[i*3+1] > 10) {
        pos[i*3+1] = -2;
        pos[i*3] = (Math.random() - 0.5) * 30;
      }
    }
    particleGeo.attributes.position.needsUpdate = true;

    // Digital rain falls and occasionally swaps glyph
    rainDrops.forEach(drop => {
      drop.position.y -= drop.userData.speed;
      drop.userData.swapTimer -= dt;
      // Occasionally swap the glyph mid-fall for a "data corruption" feel
      if (drop.userData.swapTimer <= 0) {
        drop.userData.textureIdx = Math.floor(Math.random() * glyphTextures.length);
        drop.material.map = glyphTextures[drop.userData.textureIdx];
        drop.material.needsUpdate = true;
        drop.userData.swapTimer = 1 + Math.random() * 3;
      }
      // Wrap back to top
      if (drop.position.y < drop.userData.bottomY) {
        drop.position.y = drop.userData.resetY;
        drop.position.x = (Math.random() - 0.5) * 30;
        drop.material.opacity = 0.4 + Math.random() * 0.5;
      }
    });

    // Subtle camera sway
    camera.position.x = Math.sin(t * 0.3) * 0.15;
    camera.position.y = 4 + Math.sin(t * 0.4) * 0.1;
    camera.lookAt(0, 0.5, 0);

    renderer.render(scene, camera);
  }
  animate();
})();
</script>
