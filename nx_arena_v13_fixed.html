<script>
// ============================================
// AUDIO SYSTEM — Web Audio API synthesized SFX
// All sounds generated on-the-fly, no external files.
// Call ensureAudio() on first user interaction to unlock.
// ============================================
let audioCtx = null;
let masterGain = null;
let audioUnlocked = false;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.35; // keep it reasonable by default
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  audioUnlocked = true;
}

// Generic oscillator burst with envelope
function playTone(opts) {
  if (!audioUnlocked) return;
  const {
    freq = 440, type = 'square',
    duration = 0.15, volume = 0.3,
    attack = 0.005, release = 0.1,
    freqEnd = null, filter = null, detune = 0
  } = opts;

  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.value = freq;
  osc.detune.value = detune;
  if (freqEnd !== null) {
    osc.frequency.setValueAtTime(freq, now);
    osc.frequency.exponentialRampToValueAtTime(Math.max(0.01, freqEnd), now + duration);
  }

  let node = osc;
  if (filter) {
    const filt = audioCtx.createBiquadFilter();
    filt.type = filter.type || 'lowpass';
    filt.frequency.value = filter.freq || 1000;
    filt.Q.value = filter.q || 1;
    node.connect(filt);
    node = filt;
  }

  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(volume, now + attack);
  gain.gain.linearRampToValueAtTime(0, now + duration + release);

  node.connect(gain);
  gain.connect(masterGain);

  osc.start(now);
  osc.stop(now + duration + release + 0.01);
}

// White noise burst (for hits, explosions)
function playNoise(opts) {
  if (!audioUnlocked) return;
  const { duration = 0.1, volume = 0.3, filterFreq = 1000, filterQ = 2, filterType = 'bandpass' } = opts;
  const now = audioCtx.currentTime;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  const src = audioCtx.createBufferSource();
  src.buffer = buffer;

  const filter = audioCtx.createBiquadFilter();
  filter.type = filterType;
  filter.frequency.value = filterFreq;
  filter.Q.value = filterQ;

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(volume, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

  src.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);

  src.start(now);
  src.stop(now + duration);
}

// ============================================
// SFX PRESETS — the actual game sounds
// ============================================
const SFX = {
  // UI click — short blip
  uiClick: () => {
    playTone({ freq: 880, type: 'square', duration: 0.03, volume: 0.15, release: 0.04 });
    playTone({ freq: 1760, type: 'square', duration: 0.02, volume: 0.1, release: 0.03 });
  },

  // UI hover — soft
  uiHover: () => {
    playTone({ freq: 600, type: 'sine', duration: 0.04, volume: 0.08 });
  },

  // Attack — noise burst + descending pitch
  attack: () => {
    playNoise({ duration: 0.12, volume: 0.4, filterFreq: 1500, filterType: 'bandpass', filterQ: 1.5 });
    playTone({ freq: 300, freqEnd: 80, type: 'square', duration: 0.15, volume: 0.25, release: 0.08 });
  },

  // Critical hit — heavier, higher pitch, longer
  critical: () => {
    playNoise({ duration: 0.2, volume: 0.5, filterFreq: 800, filterType: 'bandpass', filterQ: 2 });
    playTone({ freq: 800, freqEnd: 150, type: 'sawtooth', duration: 0.25, volume: 0.3, release: 0.15 });
    setTimeout(() => {
      playTone({ freq: 1200, freqEnd: 300, type: 'square', duration: 0.15, volume: 0.2, release: 0.1 });
    }, 60);
  },

  // Taking damage — low thump with crunch
  damaged: () => {
    playNoise({ duration: 0.25, volume: 0.45, filterFreq: 300, filterType: 'lowpass', filterQ: 1 });
    playTone({ freq: 110, freqEnd: 55, type: 'square', duration: 0.2, volume: 0.4, release: 0.15 });
  },

  // Heal / refactor — ascending sine sparkle
  heal: () => {
    [523, 659, 784, 1047].forEach((f, i) => {
      setTimeout(() => {
        playTone({ freq: f, type: 'sine', duration: 0.1, volume: 0.2, release: 0.15 });
        playTone({ freq: f * 2, type: 'sine', duration: 0.08, volume: 0.1, release: 0.1 });
      }, i * 60);
    });
  },

  // Swap dev — whoosh
  swap: () => {
    playNoise({ duration: 0.3, volume: 0.3, filterFreq: 600, filterType: 'bandpass', filterQ: 1 });
    playTone({ freq: 200, freqEnd: 800, type: 'sine', duration: 0.3, volume: 0.2, release: 0.1 });
  },

  // Deploy dev into arena — power-up
  deploy: () => {
    [220, 330, 440, 660, 880].forEach((f, i) => {
      setTimeout(() => {
        playTone({ freq: f, type: 'square', duration: 0.06, volume: 0.2, release: 0.08 });
      }, i * 40);
    });
  },

  // Enemy fainted — dramatic multi-layer termination sound
  ko: () => {
    // Layer 1: impact hit (immediate)
    playNoise({ duration: 0.3, volume: 0.5, filterFreq: 200, filterType: 'lowpass', filterQ: 1 });
    playTone({ freq: 120, freqEnd: 40, type: 'square', duration: 0.25, volume: 0.4, release: 0.2 });
    // Layer 2: glitch screech (100ms later)
    setTimeout(() => {
      playTone({ freq: 1800, freqEnd: 400, type: 'sawtooth', duration: 0.2, volume: 0.3, release: 0.15 });
      playNoise({ duration: 0.2, volume: 0.3, filterFreq: 2500, filterType: 'highpass', filterQ: 2 });
    }, 100);
    // Layer 3: disintegration fade (400ms later)
    setTimeout(() => {
      playTone({ freq: 600, freqEnd: 30, type: 'sawtooth', duration: 0.6, volume: 0.35, release: 0.3 });
    }, 400);
    // Layer 4: data particles crackle (throughout)
    setTimeout(() => {
      playNoise({ duration: 0.4, volume: 0.25, filterFreq: 3000, filterType: 'bandpass', filterQ: 3 });
    }, 300);
    setTimeout(() => {
      playNoise({ duration: 0.3, volume: 0.2, filterFreq: 4000, filterType: 'bandpass', filterQ: 3 });
    }, 600);
  },

  // Victory — ascending arpeggio
  victory: () => {
    [523, 659, 784, 1047, 1319].forEach((f, i) => {
      setTimeout(() => {
        playTone({ freq: f, type: 'square', duration: 0.12, volume: 0.25, release: 0.1 });
        playTone({ freq: f * 1.5, type: 'sine', duration: 0.12, volume: 0.12, release: 0.1 });
      }, i * 90);
    });
  },

  // Defeat — descending arpeggio
  defeat: () => {
    [440, 349, 294, 233, 175].forEach((f, i) => {
      setTimeout(() => {
        playTone({ freq: f, type: 'sawtooth', duration: 0.2, volume: 0.3, release: 0.15 });
      }, i * 150);
    });
  },

  // Super effective / crit announcement chime
  chime: () => {
    playTone({ freq: 1568, type: 'sine', duration: 0.08, volume: 0.25, release: 0.1 });
    setTimeout(() => playTone({ freq: 2093, type: 'sine', duration: 0.12, volume: 0.2, release: 0.15 }), 50);
  },

  // Modal open
  modalOpen: () => {
    playTone({ freq: 400, freqEnd: 1200, type: 'square', duration: 0.12, volume: 0.15, release: 0.05 });
  },
  // Modal close
  modalClose: () => {
    playTone({ freq: 1200, freqEnd: 400, type: 'square', duration: 0.12, volume: 0.15, release: 0.05 });
  },
};

function toggleSound() {
  ensureAudio();
  const btn = document.getElementById('sound-toggle');
  if (masterGain.gain.value > 0) {
    masterGain.gain.value = 0;
    btn.textContent = '🔇';
    btn.classList.add('muted');
  } else {
    masterGain.gain.value = 0.35;
    btn.textContent = '🔊';
    btn.classList.remove('muted');
    SFX.uiClick();
  }
}

// Unlock audio on first click anywhere
document.addEventListener('click', () => ensureAudio(), { once: false });

// Add hover/click sounds to all buttons
document.addEventListener('DOMContentLoaded', () => {
  // Delegate to game-wide listener for buttons
  document.getElementById('game').addEventListener('mouseover', (e) => {
    if (e.target.closest('.btn') && !e.target.closest('.btn').disabled) SFX.uiHover();
  });
});

const state = {
  player: { hp: 280, max: 280 },
  enemy: { hp: 186, max: 210 },
  turn: 3,
  busy: false
};

const $ = (id) => document.getElementById(id);

function setHP(who, value) {
  const s = state[who];
  s.hp = Math.max(0, Math.min(s.max, value));
  const pct = (s.hp / s.max) * 100;
  const bar = $(`${who}-hp`);
  bar.style.width = pct + '%';
  bar.classList.remove('medium', 'low');
  if (pct < 25) bar.classList.add('low');
  else if (pct < 55) bar.classList.add('medium');
  $(`${who}-hp-text`).textContent = `${Math.round(s.hp)}/${s.max}`;
}

function showDamage(who, amount, type = 'normal') {
  const el = $(`${who}-dmg`);
  el.textContent = amount >= 0 ? `-${amount}` : `+${Math.abs(amount)}`;
  el.classList.remove('crit', 'heal', 'show');
  if (type === 'crit') el.classList.add('crit');
  if (amount < 0) el.classList.add('heal');
  void el.offsetWidth;
  el.classList.add('show');
}

function hit(who) {
  const c = $(`${who}-holo`);
  c.classList.remove('hit');
  void c.offsetWidth;
  c.classList.add('hit');
  setTimeout(() => c.classList.remove('hit'), 400);
}

function attackAnim(who) {
  const c = $(`${who}-holo`);
  const cls = who === 'player' ? 'attacking-player' : 'attacking-enemy';
  c.classList.remove(cls);
  void c.offsetWidth;
  c.classList.add(cls);
  setTimeout(() => c.classList.remove(cls), 600);
}

// Offensive feedback — I attack, screen shakes softly, NO color change
function damageDealt() {
  const game = document.getElementById('game');
  game.classList.remove('shake-soft');
  void game.offsetWidth;
  game.classList.add('shake-soft');
  setTimeout(() => game.classList.remove('shake-soft'), 350);
}

// Defensive feedback — I get hit, screen shakes hard + red tint
function damageTaken() {
  const game = document.getElementById('game');
  const redOverlay = $('red-overlay');
  const vignette = $('red-vignette');

  // Hard shake
  game.classList.remove('shake-hard');
  void game.offsetWidth;
  game.classList.add('shake-hard');

  // Red flood
  redOverlay.classList.remove('active');
  void redOverlay.offsetWidth;
  redOverlay.classList.add('active');

  // Vignette pulse inward
  vignette.classList.remove('active');
  void vignette.offsetWidth;
  vignette.classList.add('active');

  setTimeout(() => {
    game.classList.remove('shake-hard');
    redOverlay.classList.remove('active');
    vignette.classList.remove('active');
  }, 600);
}

function setDialog(text) { $('dialog-p').innerHTML = text; }
function setButtonsEnabled(e) {
  document.querySelectorAll('.btn').forEach(b => b.disabled = !e);
}
async function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function activeName() {
  const active = squad.find(d => d.active);
  return active ? active.name : 'BUNNY_005';
}

async function attack(name, baseDmg, variant = 'normal') {
  if (state.busy) return;
  state.busy = true;
  setButtonsEnabled(false);

  let dmg = baseDmg + Math.floor(Math.random() * 6 - 2);
  let prefix = '';
  if (variant === 'crit') { dmg = Math.round(dmg * 1.5); prefix = 'Critical hit!'; }
  if (variant === 'super') { dmg = Math.round(dmg * 1.25); prefix = 'Super effective!'; }

  setDialog(`${activeName()} used <strong style="color:var(--neon-pink)">${name.replace('_', ' ')}</strong>.`);
  attackAnim('player');

  // SFX: attack sound fires with the animation
  if (variant === 'crit') SFX.critical();
  else if (variant === 'super') { SFX.attack(); setTimeout(() => SFX.chime(), 150); }
  else SFX.attack();

  await wait(400);

  damageDealt();
  hit('enemy');
  showDamage('enemy', dmg, variant === 'crit' ? 'crit' : 'normal');
  setHP('enemy', state.enemy.hp - dmg);
  await wait(800);

  if (prefix) {
    SFX.chime();
    setDialog(`<span style="color:var(--hp-yellow)">${prefix}</span>`);
    await wait(1000);
  }

  if (state.enemy.hp <= 0) {
    SFX.ko();
    playTerminationEffect('enemy');
    setDialog(`ZOMBIE_196 is being <strong style="color:var(--hp-red)">terminated</strong>...`);
    await wait(2200);  // let termination sequence fully play out
    showVictory();
    return;
  }

  await enemyTurn();
}

async function heal() {
  if (state.busy) return;
  state.busy = true;
  setButtonsEnabled(false);
  SFX.heal();
  setDialog(`${activeName()} used <strong style="color:var(--hp-green)">REFACTOR</strong>.`);
  showDamage('player', -30, 'heal');
  setHP('player', state.player.hp + 30);
  const activeIdx = squad.findIndex(d => d.active);
  if (activeIdx >= 0) squad[activeIdx].hp = state.player.hp;
  await wait(1200);
  await enemyTurn();
}

// ============================================
// TERMINATION EFFECT — dramatic death sequence
// Called when a dev's HP hits 0.
// Duration: ~2s total (0.5s glitch + 1.5s disintegration)
// ============================================
function playTerminationEffect(who) {
  const card = document.getElementById(`${who}-holo`);
  const frame = card.querySelector('.holo-frame');

  // Clean any previous termination elements
  frame.querySelectorAll('.termination-bars, .term-flash, .term-shockwave, .term-particles')
    .forEach(el => el.remove());

  // 1. White flash behind the card (impact moment)
  const flash = document.createElement('div');
  flash.className = 'term-flash active';
  frame.appendChild(flash);
  setTimeout(() => flash.remove(), 800);

  // 2. Shockwave ring (red, expands outward)
  const shock = document.createElement('div');
  shock.className = 'term-shockwave active';
  frame.appendChild(shock);
  setTimeout(() => shock.remove(), 1000);

  // 3. Scanning glitch bars (white verticals sweeping)
  const bars = document.createElement('div');
  bars.className = 'termination-bars active';
  for (let i = 0; i < 12; i++) {
    const bar = document.createElement('div');
    bar.className = 'term-bar';
    bar.style.left = `${-10 + i * 10}%`;
    bar.style.animationDelay = `${i * 0.03}s`;
    bars.appendChild(bar);
  }
  frame.appendChild(bars);
  setTimeout(() => bars.remove(), 800);

  // 4. Data particles bursting outward (code snippets + symbols)
  const particles = document.createElement('div');
  particles.className = 'term-particles';
  const glyphs = ['01', '10', '0x', '0F', 'NX', '{}', '[]', 'ERR', 'FAIL',
                  '✕', '░', '▓', '█', 'KO', 'END', '//', '!!'];
  const particleColors = ['#ff3864', '#00e5ff', '#ff4dff', '#ffffff', '#ffcc00'];

  for (let i = 0; i < 24; i++) {
    const p = document.createElement('span');
    p.className = 'term-particle';
    p.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
    p.style.color = particleColors[Math.floor(Math.random() * particleColors.length)];

    const angle = (Math.PI * 2 * i) / 24 + (Math.random() - 0.5) * 0.5;
    const distance = 80 + Math.random() * 140;
    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance;
    p.style.setProperty('--dx', `${dx}px`);
    p.style.setProperty('--dy', `${dy}px`);
    p.style.setProperty('--rot', `${(Math.random() - 0.5) * 720}deg`);
    p.style.fontSize = `${10 + Math.random() * 12}px`;
    p.style.animationDelay = `${Math.random() * 0.2}s`;
    particles.appendChild(p);
  }
  frame.appendChild(particles);
  setTimeout(() => particles.remove(), 1400);

  // 5. Trigger the main terminating class on the card
  card.classList.remove('fainted', 'terminating');
  void card.offsetWidth;
  card.classList.add('terminating');

  // 6. Screen-wide shake for impact
  const game = document.getElementById('game');
  game.classList.remove('shake-hard');
  void game.offsetWidth;
  game.classList.add('shake-hard');
  setTimeout(() => game.classList.remove('shake-hard'), 500);
}


let carrotRainInterval = null;

function startCarrotRain() {
  const container = $('carrot-rain');
  container.innerHTML = '';

  // Carrot chars — just the carrot emoji (will be re-tinted by CSS)
  // Alternative symbols for variety: using text carrots too for the neon tint effect
  const chars = ['🥕', '🥕', '🥕', '🥕', '▼', '◣'];
  const colors = ['pink', 'cyan', 'violet'];

  // Spawn carrots at a steady rate
  const spawn = () => {
    const carrot = document.createElement('div');
    carrot.className = `carrot ${colors[Math.floor(Math.random() * colors.length)]}`;

    const char = chars[Math.floor(Math.random() * chars.length)];
    // Wrap emoji in span so we can apply the tint filter only to it
    if (char === '🥕') {
      carrot.innerHTML = `<span class="carrot-glyph">${char}</span>`;
    } else {
      carrot.textContent = char;
    }

    // Random start X, random size, random speed, random rotation
    const size = 16 + Math.random() * 32;
    const left = Math.random() * 100;
    const duration = 2 + Math.random() * 3;
    const rotation = (Math.random() - 0.5) * 720; // spin any direction
    const drift = (Math.random() - 0.5) * 100; // slight horizontal drift

    carrot.style.cssText = `
      left: ${left}%;
      font-size: ${size}px;
      animation-duration: ${duration}s;
      --rotation: ${rotation}deg;
      --fall-distance: calc(100% + 80px);
    `;

    container.appendChild(carrot);

    // Cleanup after animation ends
    setTimeout(() => carrot.remove(), duration * 1000 + 100);
  };

  // Initial burst — throw a lot of carrots immediately
  for (let i = 0; i < 25; i++) {
    setTimeout(spawn, i * 40);
  }

  // Then keep spawning at a steady rate
  carrotRainInterval = setInterval(spawn, 80);
}

function stopCarrotRain() {
  if (carrotRainInterval) {
    clearInterval(carrotRainInterval);
    carrotRainInterval = null;
  }
  // Don't clear immediately so in-flight carrots finish their animation
  setTimeout(() => { $('carrot-rain').innerHTML = ''; }, 5000);
}

    </div>

function buildSquadUI() {
  const grid = $('squad-grid');
  grid.innerHTML = '';
  squad.forEach((dev, idx) => {
    const pct = (dev.hp / dev.max) * 100;
    let hpClass = '';
    if (dev.hp <= 0) hpClass = 'zero';
    else if (pct < 25) hpClass = 'low';
    else if (pct < 55) hpClass = 'medium';

    const slot = document.createElement('div');
    slot.className = 'squad-slot';
    if (dev.active) slot.classList.add('active');
    if (dev.hp <= 0) slot.classList.add('fainted');

    slot.innerHTML = `
      <div class="slot-banner">
        <span>${dev.corp.split(' // ')[0]}</span>
        <span>#${dev.id}</span>
      </div>
      <div class="slot-sprite">
        <img src="${dev.src}" alt="${dev.name}">
      </div>
      <div class="slot-footer">
        <div class="slot-name">${dev.name}</div>
        <div class="slot-hp-bar">
          <div class="slot-hp-fill ${hpClass}" style="width: ${Math.max(0, pct)}%"></div>
        </div>
        <div class="slot-stats">
          <span class="lvl">Lv.${dev.level}</span>
          <span class="hp-val">${Math.max(0, Math.round(dev.hp))}/${dev.max}</span>
        </div>
      </div>
      <div class="slot-badge-active">ACTIVE</div>
      <div class="slot-badge-fainted">KO</div>
    `;

    slot.addEventListener('click', () => {
      if (dev.active) {
        setDialog(`${dev.name} is already in the arena.`);
        setTimeout(() => closeSquad(true), 1200);
        return;
      }
      if (dev.hp <= 0) {
        setDialog(`${dev.name} is terminated. Cannot deploy.`);
        setTimeout(() => closeSquad(true), 1200);
        return;
      }
      deployDev(idx);
    });

    grid.appendChild(slot);
  });
}

function openSquad() {
  SFX.modalOpen();
  buildSquadUI();
  $('squad-modal').classList.add('active');
}

function closeSquad(fromCancel = false) {
  SFX.modalClose();
  $('squad-modal').classList.remove('active');
  // Only re-enable buttons if user cancelled manually AND player is alive
  // If called from deployDev, keep busy (deployDev manages its own re-enable)
  if (fromCancel && state.player.hp > 0) {
    state.busy = false;
    setButtonsEnabled(true);
  }
}

// ============================================
// MATERIALIZE EFFECT — builds up overlay effects
// during the 1.2s sprite reconstruction animation
// ============================================
function playMaterializeEffect() {
  const holo = $('player-holo');
  const frame = holo.querySelector('.holo-frame');

  // Remove any previous effect elements
  frame.querySelectorAll('.materialize-code, .materialize-grid').forEach(el => el.remove());
  holo.querySelectorAll('.materialize-ring').forEach(el => el.remove());

  // 1. Pixelation grid overlay fading out
  const grid = document.createElement('div');
  grid.className = 'materialize-grid active';
  frame.appendChild(grid);

  // 2. Falling code lines that scan across the frame
  const codeLayer = document.createElement('div');
  codeLayer.className = 'materialize-code active';
  for (let i = 0; i < 6; i++) {
    const line = document.createElement('div');
    line.className = 'code-line';
    line.style.animationDuration = `${0.4 + Math.random() * 0.5}s`;
    line.style.animationDelay = `${i * 0.08}s`;
    codeLayer.appendChild(line);
  }
  frame.appendChild(codeLayer);

  // 3. Expanding energy ring at base of platform
  const ring = document.createElement('div');
  ring.className = 'materialize-ring active';
  holo.appendChild(ring);

  // Cleanup after animation completes
  setTimeout(() => {
    grid.remove();
    codeLayer.remove();
    ring.remove();
  }, 1400);

  // 4. Trigger the materializing class that animates sprite + frame
  holo.classList.remove('materializing');
  void holo.offsetWidth;
  holo.classList.add('materializing');
  setTimeout(() => holo.classList.remove('materializing'), 1200);
}

// When a dev is selected from the squad, swap it into the arena
async function deployDev(idx) {
  SFX.swap();
  // Save current dev's HP back into squad data before switching
  const currentIdx = squad.findIndex(d => d.active);
  if (currentIdx >= 0) {
    squad[currentIdx].hp = state.player.hp;
    squad[currentIdx].active = false;
  }

  const newDev = squad[idx];
  newDev.active = true;

  // Update the arena UI with the new dev's data
  state.player.hp = newDev.hp;
  state.player.max = newDev.max;

  $('player-img').src = newDev.src;
  $('player-name').textContent = newDev.name;
  $('player-level').textContent = `Lv.${newDev.level}`;
  $('player-corp').textContent = newDev.corp;
  $('player-id').textContent = `#${newDev.id}`;

  setHP('player', newDev.hp);

  closeSquad();

  // Materialization sequence
  await wait(150);
  playMaterializeEffect();
  SFX.deploy();
  setDialog(`<span style="color:var(--neon-cyan)">Materializing...</span>`);

  await wait(900);  // let the summon animation play
  setDialog(`<strong style="color:var(--neon-pink)">${newDev.name}</strong> deployed to the arena!`);
  await wait(1200);

  // Enemy gets a free turn after the swap (consequence of swapping)
  setDialog(`ZOMBIE_196 takes advantage of the swap...`);
  await wait(1000);
  await enemyTurn();
}

// Hook up the SWAP DEV button
async function swap() {
  if (state.busy) return;
  state.busy = true;
  setButtonsEnabled(false);
  openSquad();
}

async function enemyTurn() {
  const moves = [
    { name: 'COLD_BOOT', dmg: 22 },
    { name: 'BACKDOOR', dmg: 28 },
    { name: 'SUPPLY_CHAIN', dmg: 34 },
    { name: 'DATA_LEAK', dmg: 20 }
  ];
  const m = moves[Math.floor(Math.random() * moves.length)];
  const dmg = m.dmg + Math.floor(Math.random() * 6);

  setDialog(`ZOMBIE_196 used <strong style="color:var(--neon-cyan)">${m.name.replace('_', ' ')}</strong>.`);
  attackAnim('enemy');
  SFX.attack();
  await wait(400);

  damageTaken();
  SFX.damaged();
  hit('player');
  showDamage('player', dmg);
  setHP('player', state.player.hp - dmg);

  // Persist HP to squad data
  const activeIdx = squad.findIndex(d => d.active);
  if (activeIdx >= 0) squad[activeIdx].hp = state.player.hp;

  await wait(1000);

  state.turn++;
  $('turn-num').textContent = state.turn;

  if (state.player.hp <= 0) {
    const fallen = activeName();
    SFX.ko();
    playTerminationEffect('player');
    setDialog(`${fallen} is being <strong style="color:var(--hp-red)">terminated</strong>...`);
    await wait(2200);

    const alive = squad.filter(d => d.hp > 0);
    if (alive.length === 0) {
      showDefeat();
      return;
    }

    setDialog(`Choose your next dev.`);
    $('player-holo').classList.remove('terminating', 'fainted');
    await wait(600);
    openSquad();
    return;
  }

  setDialog(`What will ${activeName()} do?<span class="dialog-cursor">▼</span>`);
  setButtonsEnabled(true);
  state.busy = false;
}
